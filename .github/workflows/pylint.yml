name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Debug — show files
        run: |
          pwd
          ls -la

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run local server and tests
        shell: bash
        run: |
          cd selenium_project/dist
          python -m http.server 8000 > ../http-server.log 2>&1 &
          SERVER_PID=$!
          cd ..

          trap "kill $SERVER_PID" EXIT

          # Ждем готовности сервера
          for i in {1..30}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done

          pytest -q --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: http-server-log
          path: http-server.log
